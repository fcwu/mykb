title: Doro Digest
description: Doro 的個人筆記摘要與外部素材整理（AI / Agent 工程、投資理財等）
url: https://digest.dorowu.cc
baseurl: ""
theme: jekyll-theme-cayman
markdown: kramdown
plugins:
  - jekyll-relative-links
relative_links:
  enabled: true
  collections: false
include:
  - "*.md"
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
defaults:
  - scope:
      path: ""
    values:
      layout: default
